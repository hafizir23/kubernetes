apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: greencampus-hpa
  namespace: sdg-greencampus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: greencampus-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
